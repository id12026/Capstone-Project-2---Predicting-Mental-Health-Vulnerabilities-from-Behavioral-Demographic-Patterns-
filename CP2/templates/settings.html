<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Mental Health Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            display: block;
            border-radius: 5px;
            margin: 5px 10px;
            transition: all 0.3s;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(255,255,255,0.2);
        }
        .setting-card {
            border-radius: 12px;
            border: none;
            transition: transform 0.3s;
        }
        .setting-card:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center mb-4">
                <i class="fas fa-brain me-2"></i>Admin Panel
            </h4>

            <a href="/dashboard">
                <i class="fas fa-tachometer-alt me-2"></i>Overview
            </a>
            <a href="/analytics">
                <i class="fas fa-chart-bar me-2"></i>Analytics
            </a>
            <a href="/users">
                <i class="fas fa-users me-2"></i>Users
            </a>
            <a href="/settings" class="active">
                <i class="fas fa-cog me-2"></i>Settings
            </a>

            <a href="/" class="mt-5">
                <i class="fas fa-home me-2"></i>Back to Predictor
            </a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>System Settings</h2>
                <span class="text-muted">
                    <i class="fas fa-cog me-1"></i>
                    Configuration
                </span>
            </div>

            <div class="row">
                <!-- Model Settings -->
                <div class="col-md-6">
                    <div class="card setting-card mb-4">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0"><i class="fas fa-brain me-2"></i>Model Settings</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Model Confidence Threshold</label>
                                <input type="range" class="form-range" min="0" max="100" value="80" id="confidenceThreshold">
                                <div class="d-flex justify-content-between">
                                    <span>Low</span>
                                    <span id="thresholdValue">80%</span>
                                    <span>High</span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Risk Assessment Sensitivity</label>
                                <select class="form-select" id="sensitivityLevel">
                                    <option value="low">Low Sensitivity</option>
                                    <option value="medium" selected>Medium Sensitivity</option>
                                    <option value="high">High Sensitivity</option>
                                </select>
                            </div>
                            
                            <button class="btn btn-primary w-100" id="saveModelSettings">
                                <i class="fas fa-save me-2"></i>Save Model Settings
                            </button>
                        </div>
                    </div>
                </div>

                <!-- System Settings -->
                <div class="col-md-6">
                    <div class="card setting-card mb-4">
                        <div class="card-header bg-success text-white">
                            <h5 class="mb-0"><i class="fas fa-sliders-h me-2"></i>System Settings</h5>
                        </div>
                        <div class="card-body">
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="enableLogging" checked>
                                <label class="form-check-label" for="enableLogging">
                                    Enable Detailed Logging
                                </label>
                            </div>
                            
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="enableNotifications">
                                <label class="form-check-label" for="enableNotifications">
                                    Send Admin Notifications
                                </label>
                            </div>
                            
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="autoBackup" checked>
                                <label class="form-check-label" for="autoBackup">
                                    Automatic Data Backup
                                </label>
                            </div>
                            
                            <button class="btn btn-success w-100" id="saveSystemSettings">
                                <i class="fas fa-save me-2"></i>Save System Settings
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Privacy & Security -->
                <div class="col-md-6">
                    <div class="card setting-card mb-4">
                        <div class="card-header bg-warning text-dark">
                            <h5 class="mb-0"><i class="fas fa-shield-alt me-2"></i>Privacy & Security</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Data Retention Period</label>
                                <select class="form-select" id="retentionPeriod">
                                    <option value="30">30 days</option>
                                    <option value="90" selected>90 days</option>
                                    <option value="180">180 days</option>
                                    <option value="365">1 year</option>
                                </select>
                            </div>
                            
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="anonymizeData" checked>
                                <label class="form-check-label" for="anonymizeData">
                                    Anonymize User Data
                                </label>
                            </div>
                            
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="secureTransmission">
                                <label class="form-check-label" for="secureTransmission">
                                    Enforce Secure Transmission
                                </label>
                            </div>
                            
                            <button class="btn btn-warning w-100" id="savePrivacySettings">
                                <i class="fas fa-save me-2"></i>Save Privacy Settings
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Maintenance -->
                <div class="col-md-6">
                    <div class="card setting-card mb-4">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0"><i class="fas fa-tools me-2"></i>Maintenance</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-grid gap-2 mb-3">
                                <button class="btn btn-outline-info" id="clearLogs">
                                    <i class="fas fa-trash-alt me-2"></i>Clear Old Logs
                                </button>
                                <button class="btn btn-outline-info" id="backupData">
                                    <i class="fas fa-download me-2"></i>Backup Data
                                </button>
                                <button class="btn btn-outline-info" id="refreshModels">
                                    <i class="fas fa-sync-alt me-2"></i>Refresh Models
                                </button>
                            </div>
                            
                            <div class="alert alert-info mt-3">
                                <i class="fas fa-info-circle me-2"></i>
                                Last backup: {{ now()[:19] if now else 'Never' }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Update threshold value display
    const thresholdSlider = document.getElementById('confidenceThreshold');
    const thresholdValue = document.getElementById('thresholdValue');
    
    thresholdSlider.addEventListener('input', function() {
        thresholdValue.textContent = this.value + '%';
    });
    
    // Placeholder for save functionality
    document.querySelectorAll('[id^="save"]').forEach(button => {
        button.addEventListener('click', function() {
            const settingType = this.id.replace('save', '').replace('Settings', '');
            alert(settingType + ' settings saved successfully!');
        });
    });
    
    // Placeholder for maintenance actions
    document.getElementById('clearLogs').addEventListener('click', function() {
        if(confirm('Are you sure you want to clear old logs?')) {
            alert('Logs cleared successfully!');
        }
    });
    
    document.getElementById('backupData').addEventListener('click', function() {
        alert('Starting data backup...');
    });
    
    document.getElementById('refreshModels').addEventListener('click', function() {
        if(confirm('Are you sure you want to refresh models? This may take a moment.')) {
            alert('Refreshing models...');
        }
    });
</script>
</body>
</html>
